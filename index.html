        function detectarDelimitador(linha) {
            const semicolons = (linha.match(/;/g) || []).length;
            const commas = (linha.match(/,/g) || []).length;
            return semicolons > commas ? ';' : ',';
        }

        function parseLinhaCsv(linha, delimitador) {
            const resultado = [];
            let atual = '';
            let emAspas = false;

            for (let i = 0; i < linha.length; i++) {
                const char = linha[i];
                const prox = linha[i + 1];

                if (char === '"') {
                    if (emAspas && prox === '"') {
                        atual += '"';
                        i++;
                    } else {
                        emAspas = !emAspas;
                    }
                } else if (char === delimitador && !emAspas) {
                    resultado.push(atual.trim());
                    atual = '';
                } else {
                    atual += char;
                }
            }

            resultado.push(atual.trim());
            return resultado;
        }
