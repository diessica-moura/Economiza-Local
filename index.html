<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EconomizaLocal - Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        #welcome-screen {
            position: fixed; inset: 0; background: #1d4ed8; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease-out; color: white; text-align: center; padding: 20px;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-btn.active { color: #059669; border-top: 3px solid #059669; }
        .promo-card { background: linear-gradient(135deg, #eff6ff 0%, #dcfce7 100%); }
        #toast {
            visibility: hidden; min-width: 250px; background-color: #059669; color: #fff;
            text-align: center; border-radius: 12px; padding: 16px; position: fixed;
            z-index: 10000; left: 50%; transform: translateX(-50%); top: 30px; font-weight: bold;
        }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {top: 0; opacity: 0;} to {top: 30px; opacity: 1;} }
        @keyframes fadeout { from {top: 30px; opacity: 1;} to {top: 0; opacity: 0;} }
        .detalhe-itens-carrinho { display: none; }
        .detalhe-itens-carrinho.aberto { display: block; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 font-sans">

    <div id="welcome-screen">
        <div class="mb-6 bg-white p-6 rounded-full shadow-2xl">
            <i class="fas fa-shopping-basket text-blue-700 text-6xl"></i>
        </div>
        <h1 class="text-3xl font-black mb-2 uppercase tracking-tight">EconomizaLocal</h1>
        <p class="text-blue-100 mb-10 max-w-xs text-sm">Preços de Marechal Cândido Rondon em um só lugar.</p>
        <button onclick="iniciarApp()" class="bg-green-500 hover:bg-green-600 text-white font-bold py-4 px-10 rounded-2xl shadow-lg transform active:scale-95 transition-all uppercase tracking-widest text-sm">
            Começar a Economizar
        </button>
    </div>

    <div id="app-content">
        <div id="toast">LISTA ATUALIZADA</div>
        
        <header class="bg-blue-700 text-white p-4 shadow-lg sticky top-0 z-50">
            <div class="flex justify-between items-center mb-1">
                <h1 class="text-lg font-bold flex items-center gap-2"><i class="fas fa-shopping-basket"></i> EconomizaLocal</h1>
                <button onclick="carregarDadosDaPlanilha()" class="text-white/80"><i class="fas fa-sync-alt text-sm"></i></button>
            </div>
            <div id="container-data" class="mb-3 text-[10px] text-blue-100 flex items-center gap-1 italic">Aguardando dados...</div>
            <div class="relative">
                <input type="text" id="mainSearch" onkeyup="filtrarProdutos()" placeholder="Pesquise produtos..." 
                    class="w-full p-2.5 pl-10 rounded-xl text-gray-800 text-sm outline-none shadow-md">
                <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
            </div>
        </header>

        <main class="px-4 pt-4 pb-28">
            <section id="tab-melhor-preco" class="tab-content active">
                <div id="secao-promocoes" class="hidden">
                    <h2 class="text-xs font-black text-blue-800 uppercase tracking-widest mb-3 italic">🔥 Promoções da Semana</h2>
                    <div class="flex gap-3 overflow-x-auto pb-4 mb-4" id="promo-container"></div>
                </div>
                <h2 class="text-xs font-black text-gray-400 uppercase tracking-widest mb-3">🛒 Comparativo Geral</h2>
                <div class="grid gap-4" id="comparativo-geral"></div>
            </section>
            
            <section id="tab-mercados" class="tab-content">
                <div id="lista-mercados" class="grid gap-3"></div>
                <div id="detalhe-mercado" class="hidden">
                    <button onclick="voltarMercados()" class="text-blue-600 font-bold mb-4 text-xs uppercase"><i class="fas fa-arrow-left"></i> Voltar</button>
                    <div id="mercado-header-info" class="mb-4"></div>
                    <div class="grid gap-2" id="produtos-mercado-especifico"></div>
                </div>
            </section>

            <section id="tab-carrinho" class="tab-content">
                <h2 class="text-sm font-bold text-gray-800 mb-4 uppercase text-center italic tracking-widest">Minha Lista de Compras</h2>
                <div id="carrinho-vazio" class="text-center py-10"><i class="fas fa-receipt text-gray-200 text-6xl mb-4"></i><p class="text-gray-400 text-sm">Sua lista está vazia!</p></div>
                <div id="resumo-carrinho" class="space-y-3"></div>
                <div id="btn-limpar-container" class="hidden mt-6 text-center">
                    <button onclick="limparLista()" class="text-red-400 text-xs font-bold uppercase border-b border-red-200 pb-1 italic">Limpar Lista</button>
                </div>
            </section>
        </main>

        <nav class="fixed bottom-0 w-full bg-white border-t flex justify-around p-2 shadow-2xl z-50">
            <button onclick="showTab('melhor-preco', this)" class="nav-btn active flex flex-col items-center p-2 w-full"><i class="fas fa-award text-xl"></i><span class="text-[9px] mt-1 font-bold uppercase">Melhor Preço</span></button>
            <button onclick="showTab('mercados', this)" class="nav-btn flex flex-col items-center p-2 w-full text-gray-400"><i class="fas fa-store text-xl"></i><span class="text-[9px] mt-1 font-bold uppercase">Mercados</span></button>
            <button onclick="showTab('carrinho', this)" class="nav-btn flex flex-col items-center p-2 w-full text-gray-400"><i class="fas fa-shopping-bag text-xl"></i><span class="text-[9px] mt-1 font-bold uppercase">Minha Lista</span></button>
        </nav>
    </div>

    <script>
        const mercados = [
             { id: 'M1', nome: "Copagril", url: https://docs.google.com/spreadsheets/d/e/2PACX-1vRZR9LPUdow0IRmU5_gW8OGjVK_Faj2svOND_t24Swl-iGCl5fVIM1T8aITDtwKQVIH99cVlCacl0Qb/pub?output=csv },
            { id: 'M2', nome: "Waimann", url: https://docs.google.com/spreadsheets/d/e/2PACX-1vRFacFVwUWZH05G-eW5rv7ulXrWG2JzbTU8Je30SM5w_1ATc6hZUcXH2kSZHvpHT6GZc4k4gvPkXHqE/pubhtml },
            { id: 'M3', nome: "Dilettare", url: https://docs.google.com/spreadsheets/d/e/2PACX-1vRyfBLLoi1FHBxGFjQ6IfCCtSJWkVWU-F1q8XBf3DyaYvaLYCigCprhXpUbD6n78iVynFRfN3uRq7pE/pub?output=csv },
            { id: 'M4', nome: "Allmayer", url: https://docs.google.com/spreadsheets/d/e/2PACX-1vSZyyTZ_BEpICvBTjP1updcWvGjmutPITHB8YerfSVwlMn1AK43YQB0w2G_zeoLKauZWakt1_dcdrYC/pub?output=csv },
            { id: 'M5', nome: "Super Cercar", url: https://docs.google.com/spreadsheets/d/e/2PACX-1vQjKk7LVFzBJ-fMEcafo6OLeIGpGQ4NuX5e8dgn526woGPBeIRG4CAFMExlgqwhQm7YR6lkM_INFsAQ/pub?output=csv },
            { id: 'M6', nome: "Max Atacadista", url: https://docs.google.com/spreadsheets/d/e/2PACX-1vSqNCBlxAPIvnt8DJsRunDVYbc6FsUt7HYNegjXa-KQhiYwnJJxdJiwdvY37hwSGMPjHavQ8VJyf9_E/pub?output=csv },
            { id: 'M7', nome: "Portuga", url: https://docs.google.com/spreadsheets/d/e/2PACX-1vTx_crfv1VifyqpsfLjn90YUlm978uZy2CDPFpR0zxUEvZbvn71r-oWMylGqEIpGXusg8lyChqQ27kv/pub?output=csv },
            { id: 'M8', nome: "Wink", url: https://docs.google.com/spreadsheets/d/e/2PACX-1vTYVeL5I7AzIIcNkTytBhGbIbNE46sUw-nnvXEx9usAUT-xMre4IY7E-Fz0jcM7og_otXHWKk8nlIE1/pub?output=csv },
            { id: 'M9', nome: "Super Favorito", url: https://docs.google.com/spreadsheets/d/e/2PACX-1vTKfkjZ9_Opghojp_3ftEZpKd-q6DXNomEeJ46f8aQnzXAv5LhPtWjjz_5ryLxUHI3eU2SpskBp3Y3s/pub?output=csv }
        ];

        let produtos = [];
        let minhaLista = [];
        let mercadoAtualId = null;

        // --- 2. INICIALIZAÇÃO ---
        function iniciarApp() {
            document.getElementById('welcome-screen').style.display = 'none';
        }

        async function carregarDadosDaPlanilha() {
            const mapaProdutos = {};
            let carregouAlgum = false;

            for (const m of mercados) {
                // Só tenta baixar se o link parecer válido
                if (!m.url || m.url.length < 20) continue;

                try {
                    const response = await fetch(m.url + "?t=" + new Date().getTime());
                    const data = await response.text();
                    const rows = data.split(/\r?\n/).slice(1);

                    rows.forEach(row => {
                        const cols = row.split(/[,;]/);
                        if (cols.length < 4 || !cols[0]) return;

                        const id = cols[0].trim();
                        if (!mapaProdutos[id]) {
                            mapaProdutos[id] = {
                                id: id,
                                nome: cols[1].trim(),
                                marca: cols[2].trim(),
                                promo: cols[4] ? cols[4].toUpperCase().includes('PROMO') : false
                            };
                            mercados.forEach(mer => mapaProdutos[id][`preco${mer.id}`] = 0);
                        }
                        
                        let preco = (cols[3] || "0").replace('R$', '').replace('.', '').replace(',', '.').trim();
                        mapaProdutos[id][`preco${m.id}`] = parseFloat(preco) || 0;
                        carregouAlgum = true;
                    });
                } catch (err) {
                    console.warn("Falha ao carregar mercado:", m.nome);
                }
            }

            produtos = Object.values(mapaProdutos);
            document.getElementById('container-data').innerText = carregouAlgum ? "Dados atualizados com sucesso!" : "Nenhum link de planilha configurado.";
            
            filtrarProdutos();
            renderizarMercados();
        }

        // --- 3. LÓGICA DE INTERFACE ---
        function filtrarProdutos() {
            const termo = document.getElementById('mainSearch').value.toLowerCase();
            const filtrados = produtos.filter(p => 
                p.nome.toLowerCase().includes(termo) || p.marca.toLowerCase().includes(termo)
            );
            renderizarHome(filtrados, termo.length > 0);
        }

        function renderizarHome(lista, isBusca) {
            const geralCont = document.getElementById('comparativo-geral');
            const promoCont = document.getElementById('promo-container');
            const secaoPromo = document.getElementById('secao-promocoes');
            geralCont.innerHTML = '';
            
            // Renderiza Promoções
            if(!isBusca) {
                const promos = produtos.filter(p => p.promo);
                if(promos.length > 0) {
                    secaoPromo.classList.remove('hidden');
                    promoCont.innerHTML = promos.map(p => {
                        const precos = mercados.map(m => p[`preco${m.id}`]).filter(v => v > 0);
                        const min = Math.min(...precos);
                        const merc = mercados.find(m => p[`preco${m.id}`] === min);
                        return `
                            <div class="promo-card min-w-[150px] p-3 rounded-xl border shadow-sm">
                                <h4 class="font-bold text-xs truncate">${p.nome}</h4>
                                <p class="text-[9px] text-blue-600 font-bold uppercase">${merc.nome}</p>
                                <p class="text-green-600 font-black">R$ ${min.toFixed(2)}</p>
                            </div>`;
                    }).join('');
                } else { secaoPromo.classList.add('hidden'); }
            }

            // Renderiza Lista Geral
            geralCont.innerHTML = lista.map(p => {
                const itemNaLista = minhaLista.find(i => i.id === p.id);
                const qtd = itemNaLista ? itemNaLista.quantidade : 0;
                const precosValidos = mercados.map(m => p[`preco${m.id}`]).filter(v => v > 0);
                if (precosValidos.length === 0) return '';
                const min = Math.min(...precosValidos);
                const merc = mercados.find(m => p[`preco${m.id}`] === min);

                return `
                <div class="bg-white p-3 rounded-xl border flex justify-between items-center shadow-sm">
                    <div class="flex-1">
                        <h4 class="text-sm font-bold text-gray-800">${p.nome} <span class="text-[9px] text-gray-400">(${p.marca})</span></h4>
                        <p class="text-[10px]"><span class="text-green-600 font-bold">R$ ${min.toFixed(2)}</span> no ${merc.nome}</p>
                    </div>
                    ${renderSeletorQtd(p.id, qtd)}
                </div>`;
            }).join('');
        }

        function renderSeletorQtd(id, qtd) {
            const idStr = String(id);
            if (qtd === 0) return `<button onclick="adicionarLista('${idStr}')" class="bg-green-600 text-white text-[10px] px-3 py-2 rounded-lg font-bold">Adicionar</button>`;
            return `<div class="flex items-center gap-2 bg-slate-100 p-1 rounded-lg">
                <button onclick="removerItem('${idStr}')" class="w-7 h-7 bg-white rounded text-red-500 shadow-sm"><i class="fas ${qtd === 1 ? 'fa-trash-alt' : 'fa-minus'} text-[10px]"></i></button>
                <span class="text-xs font-black min-w-[15px] text-center">${qtd}</span>
                <button onclick="adicionarLista('${idStr}')" class="w-7 h-7 bg-green-600 rounded text-white shadow-sm"><i class="fas fa-plus text-[10px]"></i></button>
            </div>`;
        }

        function adicionarLista(id) {
            const item = minhaLista.find(i => i.id === id);
            if (item) item.quantidade++;
            else { 
                const p = produtos.find(prod => prod.id === id);
                if(p) minhaLista.push({ ...p, quantidade: 1 });
            }
            atualizarInterface();
        }

        function removerItem(id) {
            const item = minhaLista.find(i => i.id === id);
            if (item) {
                if (item.quantidade > 1) item.quantidade--;
                else minhaLista = minhaLista.filter(i => i.id !== id);
            }
            atualizarInterface();
        }

        function atualizarInterface() {
            filtrarProdutos();
            renderizarCarrinho();
            if(mercadoAtualId) abrirMercado(mercadoAtualId);
            const x = document.getElementById("toast"); x.className = "show"; setTimeout(() => x.className = "", 2000);
        }

        function renderizarCarrinho() {
            const cont = document.getElementById('resumo-carrinho');
            const vazio = document.getElementById('carrinho-vazio');
            const btnLimpar = document.getElementById('btn-limpar-container');
            
            if(minhaLista.length === 0) {
                cont.innerHTML = ''; vazio.classList.remove('hidden'); btnLimpar.classList.add('hidden');
                return;
            }
            vazio.classList.add('hidden'); btnLimpar.classList.remove('hidden');
            
            cont.innerHTML = mercados.map(m => {
                const totalM = minhaLista.reduce((acc, p) => acc + (p[`preco${m.id}`] * p.quantidade), 0);
                if(totalM <= 0) return '';
                return `
                <div class="bg-white rounded-2xl shadow-sm border p-4 mb-3">
                    <div class="flex justify-between items-center">
                        <div><h3 class="font-bold text-gray-800 text-sm">${m.nome}</h3><p class="text-[10px] text-gray-400">${minhaLista.length} itens</p></div>
                        <p class="text-lg font-black text-blue-600">R$ ${totalM.toFixed(2)}</p>
                    </div>
                </div>`;
            }).join('');
        }

        function renderizarMercados() {
            const cont = document.getElementById('lista-mercados');
            cont.innerHTML = mercados.map(m => `
                <div onclick="abrirMercado('${m.id}')" class="bg-white p-4 rounded-xl border flex justify-between items-center shadow-sm">
                    <span class="font-bold text-gray-700">${m.nome}</span>
                    <i class="fas fa-chevron-right text-gray-200"></i>
                </div>`).join('');
        }

        function abrirMercado(id) {
            mercadoAtualId = id;
            const m = mercados.find(mer => mer.id === id);
            document.getElementById('lista-mercados').classList.add('hidden');
            document.getElementById('detalhe-mercado').classList.remove('hidden');
            document.getElementById('mercado-header-info').innerHTML = `<div class="bg-blue-700 p-4 rounded-xl text-white shadow-md"><h3 class="font-bold">${m.nome}</h3></div>`;
            
            document.getElementById('produtos-mercado-especifico').innerHTML = produtos.map(p => {
                const item = minhaLista.find(i => i.id === p.id);
                const qtd = item ? item.quantidade : 0;
                const preco = p[`preco${id}`];
                if(preco <= 0) return '';
                return `
                <div class="bg-white p-3 rounded-lg border flex justify-between items-center">
                    <div><p class="text-sm font-medium text-gray-800">${p.nome}</p><p class="text-xs text-blue-600 font-bold">R$ ${preco.toFixed(2)}</p></div>
                    ${renderSeletorQtd(p.id, qtd)}
                </div>`;
            }).join('');
        }

        function voltarMercados() {
            mercadoAtualId = null;
            document.getElementById('lista-mercados').classList.remove('hidden');
            document.getElementById('detalhe-mercado').classList.add('hidden');
        }

        function limparLista() { minhaLista = []; atualizarInterface(); }

        function showTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            el.classList.add('active');
        }

        window.onload = carregarDadosDaPlanilha;
    </script>
</body>
</html>
