<body>
    <div id="secao-login" style="display: block; text-align: center; padding-top: 50px;">
        <h2>Economiza Local - Admin</h2>
        <input type="email" id="email" placeholder="E-mail do Admin" style="display:block; margin: 10px auto;">
        <input type="password" id="senha" placeholder="Senha" style="display:block; margin: 10px auto;">
        <button id="btnEntrar">Entrar no Painel</button>
    </div>

    <div id="secao-produtos" style="display: none;">
        </div>

    <script type="module">
        import { auth } from './firebase-config.js';
        import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const loginDiv = document.getElementById('secao-login');
        const produtosDiv = document.getElementById('secao-produtos');
        const btn = document.getElementById('btnEntrar');

        btn.addEventListener('click', () => {
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;

            signInWithEmailAndPassword(auth, email, senha)
                .then((userCredential) => {
                    // SUCESSO! Esconde o login e mostra os produtos
                    loginDiv.style.display = 'none';
                    produtosDiv.style.display = 'block';
                    console.log("Bem-vindo!");
                })
                .catch((error) => {
                    alert("Erro ao entrar: " + error.message);
                });
        });
    </script>
</body>
