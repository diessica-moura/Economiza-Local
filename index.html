<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EconomizaLocal - Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" sizes="32x32" href="./icon-32.png?v=3">
    <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png?v=3">
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png?v=3">
    <link rel="manifest" href="./manifest.webmanifest?v=3">
    <meta name="theme-color" content="#1d4ed8">
    <style>
        #welcome-screen {
            position: fixed;
            inset: 0;
            background: #1d4ed8;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease-out, visibility 0.5s;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .welcome-cart-wrap { width: 180px; margin-bottom: 24px; }
        .welcome-cart-track {
            position: relative; height: 92px; border-radius: 999px;
            background: rgba(255, 255, 255, 0.12); overflow: hidden;
        }
        .welcome-cart {
            position: absolute; left: 16px; top: 20px; color: #ffffff;
            font-size: 52px; animation: cartDrive 2.2s ease-in-out infinite;
        }
        @keyframes cartDrive {
            0% { transform: translateX(0); }
            50% { transform: translateX(100px); }
            100% { transform: translateX(0); }
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-btn.active { color: #059669; border-top: 3px solid #059669; }
        #toast {
            visibility: hidden; min-width: 250px; background-color: #059669; color: #fff;
            text-align: center; border-radius: 12px; padding: 16px; position: fixed;
            z-index: 100; left: 50%; transform: translateX(-50%); top: 30px; font-weight: bold;
        }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {top: 0; opacity: 0;} to {top: 30px; opacity: 1;} }
        @keyframes fadeout { from {top: 30px; opacity: 1;} to {top: 0; opacity: 0;} }
        .detalhe-itens-carrinho { display: none; }
        .detalhe-itens-carrinho.aberto { display: block; }
    </style>
</head>
<body class="bg-slate-50 font-sans">

    <div id="welcome-screen">
        <div class="welcome-cart-wrap">
            <div class="welcome-cart-track shadow-2xl">
                <i class="fas fa-shopping-cart welcome-cart"></i>
            </div>
        </div>
        <h1 class="text-3xl font-black mb-2 uppercase">EconomizaLocal</h1>
        <p class="text-blue-100 mb-10 text-sm">Carregando os melhores preços...</p>
        <button id="btn-comecar" onclick="iniciarApp()" class="hidden bg-green-500 text-white font-bold py-4 px-10 rounded-2xl shadow-lg uppercase tracking-widest text-sm">
            Começar a Economizar
        </button>
    </div>

    <div id="app-content">
        <div id="toast">LISTA ATUALIZADA</div>
        
        <header class="bg-blue-700 text-white p-4 shadow-lg sticky top-0 z-50">
            <div class="flex justify-between items-center mb-2">
                <h1 class="text-lg font-bold"><i class="fas fa-shopping-basket"></i> EconomizaLocal</h1>
                <button onclick="carregarDadosDaPlanilha()" class="text-white/80"><i class="fas fa-sync-alt text-sm"></i></button>
            </div>
            <div id="container-data" class="mb-3 text-[10px] text-blue-100 italic">Atualizando...</div>
            <div class="relative">
                <input type="text" id="mainSearch" onkeyup="filtrarProdutos()" placeholder="Pesquise produtos..." 
                    class="w-full p-2.5 pl-10 rounded-xl text-gray-800 text-sm outline-none shadow-md">
                <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
            </div>
        </header>

        <main class="px-4 pt-4 pb-28">
            <section id="tab-melhor-preco" class="tab-content active">
                <div id="secao-promocoes">
                    <h2 class="text-xs font-black text-blue-800 uppercase tracking-widest mb-3 italic">🔥 Promoções</h2>
                    <div class="flex gap-3 overflow-x-auto pb-4 mb-4" id="promo-container"></div>
                </div>
                <h2 class="text-xs font-black text-gray-400 uppercase tracking-widest mb-3">🛒 Comparativo Geral</h2>
                <div class="grid gap-4" id="comparativo-geral"></div>
            </section>
            
            <section id="tab-mercados" class="tab-content">
                <div id="lista-mercados" class="grid gap-3"></div>
                <div id="detalhe-mercado" class="hidden">
                    <button onclick="voltarMercados()" class="text-blue-600 font-bold mb-4 text-xs uppercase"><i class="fas fa-arrow-left"></i> Voltar</button>
                    <div id="mercado-header-info" class="mb-4"></div>
                    <div class="grid gap-2" id="produtos-mercado-especifico"></div>
                </div>
            </section>

            <section id="tab-carrinho" class="tab-content">
                <div id="carrinho-vazio" class="text-center py-10"><p class="text-gray-400 text-sm">Sua lista está vazia!</p></div>
                <div id="resumo-carrinho" class="space-y-3"></div>
            </section>
        </main>

        <nav class="fixed bottom-0 w-full bg-white border-t flex justify-around p-2 shadow-2xl z-50">
            <button onclick="showTab('melhor-preco', this)" class="nav-btn active flex flex-col items-center p-2 w-full"><i class="fas fa-award text-xl"></i><span class="text-[9px] mt-1 font-bold">MELHOR PREÇO</span></button>
            <button onclick="showTab('mercados', this)" class="nav-btn flex flex-col items-center p-2 w-full text-gray-400"><i class="fas fa-store text-xl"></i><span class="text-[9px] mt-1 font-bold">MERCADOS</span></button>
            <button onclick="showTab('carrinho', this)" class="nav-btn flex flex-col items-center p-2 w-full text-gray-400"><i class="fas fa-shopping-bag text-xl"></i><span class="text-[9px] mt-1 font-bold">MINHA LISTA</span></button>
        </nav>
    </div>

    <script>
        const mercados = [
            { id: 'M1', nome: "Copagril", url: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRZR9LPUdow0IRmU5_gW8OGjVK_Faj2svOND_t24Swl-iGCl5fVIM1T8aITDtwKQVIH99cVlCacl0Qb/pub?output=csv' },
            { id: 'M2', nome: "Waimann", url: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vFacFVwUWZH05G-eW5rv7ulXrWG2JzbTU8Je30SM5w_1ATc6hZUcXH2kSZHvpHT6GZc4k4gvPkXHqE/pub?output=csv' },
            { id: 'M3', nome: "Dilettare", url: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRyfBLLoi1FHBxGFjQ6IfCCtSJWkVWU-F1q8XBf3DyaYvaLYCigCprhXpUbD6n78iVynFRfN3uRq7pE/pub?output=csv' },
            { id: 'M4', nome: "Allmayer", url: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSZyyTZ_BEpICvBTjP1updcWvGjmutPITHB8YerfSVwlMn1AK43YQB0w2G_zeoLKauZWakt1_dcdrYC/pub?output=csv' },
            { id: 'M5', nome: "Super Cercar", url: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQjKk7LVFzBJ-fMEcafo6OLeIGpGQ4NuX5e8dgn526woGPBeIRG4CAFMExlgqwhQm7YR6lkM_INFsAQ/pub?output=csv' },
            { id: 'M6', nome: "Max Atacadista", url: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSqNCBlxAPIvnt8DJsRunDVYbc6FsUt7HYNegjXa-KQhiYwnJJxdJiwdvY37hwSGMPjHavQ8VJyf9_E/pub?output=csv' },
            { id: 'M7', nome: "Portuga", url: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTx_crfv1VifyqpsfLjn90YUlm978uZy2CDPFpR0zxUEvZbvn71r-oWMylGqEIpGXusg8lyChqQ27kv/pub?output=csv' },
            { id: 'M8', nome: "Wink", url: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTYVeL5I7AzIIcNkTytBhGbIbNE46sUw-nnvXEx9usAUT-xMre4IY7E-Fz0jcM7og_otXHWKk8nlIE1/pub?output=csv' },
            { id: 'M9', nome: "Super Favorito", url: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTKfkjZ9_Opghojp_3ftEZpKd-q6DXNomEeJ46f8aQnzXAv5LhPtWjjz_5ryLxUHI3eU2SpskBp3Y3s/pub?output=csv' }
        ];

        let produtos = [];
        let minhaLista = JSON.parse(localStorage.getItem('minhaLista') || '[]');
        let mercadoAtualId = null;

        function iniciarApp() {
            document.getElementById('welcome-screen').style.opacity = '0';
            setTimeout(() => { document.getElementById('welcome-screen').style.visibility = 'hidden'; }, 500);
        }

        async function carregarDadosDaPlanilha() {
            document.getElementById('container-data').innerHTML = "Atualizando preços...";
            const mapaProdutos = {};

            for (const m of mercados) {
                try {
                    const res = await fetch(m.url + '&t=' + new Date().getTime());
                    const texto = await res.text();
                    const linhas = texto.split('\n').slice(1);
                    
                    linhas.forEach(linha => {
                        const col = linha.split(/[,;]/); // Aceita vírgula ou ponto e vírgula
                        if (col.length < 4) return;
                        const id = col[0].trim();
                        if (!mapaProdutos[id]) {
                            mapaProdutos[id] = { id, nome: col[1], marca: col[2], promo: col[4]?.includes('PROMOCAO') };
                            mercados.forEach(merc => mapaProdutos[id][`preco${merc.id}`] = 0);
                        }
                        mapaProdutos[id][`preco${m.id}`] = parseFloat(col[3].replace(',', '.'));
                    });
                } catch (e) { console.error("Erro no mercado " + m.nome, e); }
            }

            produtos = Object.values(mapaProdutos);
            document.getElementById('container-data').innerHTML = "Atualizado hoje";
            document.getElementById('btn-comecar').classList.remove('hidden');
            renderizarHome();
            renderizarMercados();
            renderizarCarrinho();
        }

        function renderizarHome() {
            const container = document.getElementById('comparativo-geral');
            container.innerHTML = produtos.map(p => {
                const precos = mercados.map(m => p[`preco${m.id}`]).filter(v => v > 0);
                const min = Math.min(...precos);
                const mIdeal = mercados.find(m => p[`preco${m.id}`] === min);
                return `
                    <div class="bg-white p-3 rounded-xl border flex justify-between items-center shadow-sm">
                        <div>
                            <h4 class="text-sm font-bold">${p.nome}</h4>
                            <p class="text-[10px] text-green-600 font-bold">R$ ${min.toFixed(2)} no ${mIdeal?.nome}</p>
                        </div>
                        <button onclick="adicionarLista('${p.id}')" class="bg-blue-600 text-white text-[10px] px-3 py-2 rounded-lg font-bold">ADD</button>
                    </div>`;
            }).join('');
        }

        function adicionarLista(id) {
            const p = produtos.find(prod => prod.id === id);
            const existe = minhaLista.find(item => item.id === id);
            if (existe) existe.quantidade++;
            else minhaLista.push({ ...p, quantidade: 1 });
            localStorage.setItem('minhaLista', JSON.stringify(minhaLista));
            renderizarCarrinho();
            mostrarToast();
        }

        function mostrarToast() {
            const x = document.getElementById("toast");
            x.className = "show";
            setTimeout(() => { x.className = x.className.replace("show", ""); }, 3000);
        }

        function renderizarCarrinho() {
            const cont = document.getElementById('resumo-carrinho');
            if (minhaLista.length === 0) return;
            document.getElementById('carrinho-vazio').classList.add('hidden');
            
            cont.innerHTML = mercados.map(m => {
                let total = 0;
                minhaLista.forEach(p => { total += (p[`preco${m.id}`] || 0) * p.quantidade; });
                return `
                    <div class="bg-white p-4 rounded-xl border flex justify-between items-center shadow-sm">
                        <span class="font-bold text-sm">${m.nome}</span>
                        <span class="text-blue-600 font-black">R$ ${total.toFixed(2)}</span>
                    </div>`;
            }).join('');
        }

        function renderizarMercados() {
            document.getElementById('lista-mercados').innerHTML = mercados.map(m => `
                <div onclick="abrirMercado('${m.id}')" class="bg-white p-4 rounded-xl border flex justify-between items-center cursor-pointer">
                    <span class="font-bold">${m.nome}</span>
                    <i class="fas fa-chevron-right text-gray-300"></i>
                </div>`).join('');
        }

        function abrirMercado(id) {
            document.getElementById('lista-mercados').classList.add('hidden');
            document.getElementById('detalhe-mercado').classList.remove('hidden');
            const m = mercados.find(merc => merc.id === id);
            document.getElementById('mercado-header-info').innerHTML = `<h3 class="font-bold text-blue-700">${m.nome}</h3>`;
        }

        function voltarMercados() {
            document.getElementById('lista-mercados').classList.remove('hidden');
            document.getElementById('detalhe-mercado').classList.add('hidden');
        }

        function showTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => { b.classList.add('text-gray-400'); b.classList.remove('active'); });
            document.getElementById('tab-' + id).classList.add('active');
            el.classList.add('active');
            el.classList.remove('text-gray-400');
        }

        function filtrarProdutos() {
            const termo = document.getElementById('mainSearch').value.toLowerCase();
            const filtrados = produtos.filter(p => p.nome.toLowerCase().includes(termo));
            const container = document.getElementById('comparativo-geral');
            container.innerHTML = filtrados.map(p => {
                const precos = mercados.map(m => p[`preco${m.id}`]).filter(v => v > 0);
                const min = Math.min(...precos);
                return `<div class="bg-white p-3 rounded-xl border flex justify-between items-center shadow-sm">
                    <h4 class="text-sm font-bold">${p.nome}</h4>
                    <button onclick="adicionarLista('${p.id}')" class="bg-blue-600 text-white text-[10px] px-3 py-2 rounded-lg font-bold">ADD</button>
                </div>`;
            }).join('');
        }

        window.onload = carregarDadosDaPlanilha;
    </script>
</body>
</html>
